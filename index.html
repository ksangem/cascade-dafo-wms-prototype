<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cascade DAFO — WMS Intelligence Platform</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
:root {
  --cascade-blue: #0057B8;
  --cascade-blue-dark: #003F8A;
  --cascade-blue-mid: #1A6FD4;
  --cascade-blue-light: #E0EDFF;
  --cascade-navy: #0D1E3A;
  --white: #FFFFFF;
  --surface: #F4F7FB;
  --border: #D1DCE8;
  --green: #065F46;
  --green-light: #ECFDF5;
  --amber: #D97706;
  --amber-light: #FFFBEB;
  --red: #C53030;
  --red-light: #FEF2F2;
  --text-primary: #0D1E3A;
  --text-secondary: #5A6A7E;
  --gray-light: #F1F5F9;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--surface); color:var(--text-primary); font-size:14px; line-height:1.5; }
button { cursor:pointer; font-family:inherit; border:none; }
input,select,textarea { font-family:inherit; font-size:14px; }
/* Login */
.login-wrap { display:flex; min-height:100vh; }
.login-left { flex:0 0 55%; background:linear-gradient(155deg,#0D1E3A 0%,#0057B8 60%,#1A6FD4 100%); color:#fff; display:flex; flex-direction:column; justify-content:center; padding:60px; }
.login-left h1 { font-size:36px; font-weight:700; margin-bottom:8px; }
.login-left .tagline { font-size:18px; opacity:.85; margin-bottom:36px; }
.login-left .features { list-style:none; }
.login-left .features li { font-size:15px; margin-bottom:14px; opacity:.9; }
.login-right { flex:1; display:flex; flex-direction:column; justify-content:center; padding:60px; background:#fff; }
.login-right h2 { font-size:22px; font-weight:700; color:var(--cascade-navy); margin-bottom:4px; }
.login-right .subtitle { color:var(--text-secondary); margin-bottom:28px; }
.form-field { margin-bottom:16px; }
.form-field label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.form-field input { width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:7px; font-size:14px; }
.form-field input:focus { outline:none; border-color:var(--cascade-blue); box-shadow:0 0 0 3px rgba(0,87,184,.12); }
.role-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px; }
.role-card { border:2px solid var(--border); border-radius:10px; padding:14px; text-align:center; transition:all .15s; }
.role-card:hover { border-color:var(--cascade-blue-mid); background:var(--cascade-blue-light); }
.role-card.active { border-color:var(--cascade-blue); background:var(--cascade-blue-light); }
.role-card .rname { font-weight:600; font-size:14px; color:var(--cascade-navy); }
.role-card .rtitle { font-size:12px; color:var(--text-secondary); }
.btn-primary { width:100%; padding:14px; background:var(--cascade-blue); color:#fff; font-size:16px; font-weight:600; border-radius:7px; transition:background .15s; }
.btn-primary:hover { background:var(--cascade-blue-dark); }
.btn-sm { padding:8px 16px; font-size:13px; font-weight:600; border-radius:7px; }
.btn-blue { background:var(--cascade-blue); color:#fff; }
.btn-blue:hover { background:var(--cascade-blue-dark); }
.btn-green { background:var(--green); color:#fff; }
.btn-green:hover { background:#054d38; }
.btn-amber { background:var(--amber); color:#fff; }
.btn-red { background:var(--red); color:#fff; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text-primary); }
.btn-outline:hover { border-color:var(--cascade-blue); color:var(--cascade-blue); }
.login-footer { text-align:center; color:var(--text-secondary); font-size:12px; margin-top:24px; }
.field-error { color:var(--red); font-size:12px; margin-top:4px; }
/* App Shell */
.app-shell { display:flex; min-height:100vh; }
.sidebar { width:240px; background:var(--cascade-navy); color:#fff; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; }
.sidebar-logo { padding:20px 18px 12px; border-bottom:1px solid rgba(255,255,255,.1); }
.sidebar-logo .logo-mark { display:inline-flex; align-items:center; gap:10px; }
.sidebar-logo .logo-icon { width:32px; height:32px; background:var(--cascade-blue); border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; color:#fff; }
.sidebar-logo .logo-text { font-size:15px; font-weight:600; }
.sidebar-logo .logo-text span { color:var(--cascade-blue); }
.sidebar-logo .logo-sub { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#7F9FCC; margin-top:2px; margin-left:42px; }
.sidebar-nav { flex:1; padding:12px 0; overflow-y:auto; }
.nav-section { padding:0 18px; margin-bottom:4px; }
.nav-section-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,.4); padding:10px 0 6px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 18px; font-size:13px; color:rgba(255,255,255,.75); cursor:pointer; border-left:3px solid transparent; transition:all .12s; border-radius:0; }
.nav-item:hover { color:#fff; background:rgba(255,255,255,.06); }
.nav-item.active { color:#fff; background:var(--cascade-blue-light); background:rgba(0,87,184,.2); border-left-color:var(--cascade-blue); }
.nav-item .nav-icon { font-size:16px; width:20px; text-align:center; }
.nav-badge { margin-left:auto; background:var(--red); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; }
.nav-badge.amber { background:var(--amber); }
.sidebar-user { padding:16px 18px; border-top:1px solid rgba(255,255,255,.1); display:flex; align-items:center; gap:10px; }
.sidebar-user .avatar { width:32px; height:32px; border-radius:50%; background:var(--cascade-blue); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:13px; }
.sidebar-user .uname { font-size:13px; font-weight:600; }
.sidebar-user .urole { font-size:11px; color:rgba(255,255,255,.5); }
.main-area { margin-left:240px; flex:1; display:flex; flex-direction:column; min-height:100vh; }
.topbar { background:#fff; border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.topbar-title { font-size:22px; font-weight:700; color:var(--cascade-navy); }
.topbar-actions { display:flex; align-items:center; gap:14px; }
.topbar-search { padding:8px 14px; border:1px solid var(--border); border-radius:7px; width:220px; font-size:13px; }
.topbar-btn { background:var(--cascade-blue-light); color:var(--cascade-blue); padding:8px 14px; border-radius:7px; font-weight:600; font-size:13px; display:flex; align-items:center; gap:6px; }
.topbar-btn:hover { background:var(--cascade-blue); color:#fff; }
.bell-btn { position:relative; background:none; font-size:20px; padding:4px; }
.bell-badge { position:absolute; top:-2px; right:-4px; background:var(--red); color:#fff; font-size:9px; font-weight:700; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.facility-bar { background:#fff; border-bottom:1px solid var(--border); padding:10px 24px; display:flex; gap:24px; font-size:13px; }
.facility-pill { display:flex; align-items:center; gap:8px; }
.facility-dot { width:8px; height:8px; border-radius:50%; }
.facility-dot.green { background:var(--green); }
.facility-dot.amber { background:var(--amber); }
.facility-dot.red { background:var(--red); }
.page-content { padding:20px 24px; flex:1; }
/* Cards and Layout */
.card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:18px; margin-bottom:16px; }
.card-header { font-size:15px; font-weight:600; color:var(--cascade-navy); margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:16px; }
.kpi-card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:18px; }
.kpi-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text-secondary); margin-bottom:6px; }
.kpi-value { font-size:28px; font-weight:700; color:var(--cascade-navy); }
.kpi-trend { font-size:12px; margin-top:4px; }
.kpi-trend.red { color:var(--red); }
.kpi-trend.green { color:var(--green); }
.kpi-trend.amber { color:var(--amber); }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.grid-2-1 { display:grid; grid-template-columns:1.5fr 1fr; gap:16px; }
/* Quick Action Tiles */
.quick-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:16px; }
.quick-tile { background:#fff; border:1px solid var(--border); border-radius:10px; padding:18px; text-align:center; cursor:pointer; transition:all .15s; }
.quick-tile:hover { border-color:var(--cascade-blue); box-shadow:0 4px 12px rgba(0,87,184,.1); transform:translateY(-1px); }
.quick-tile .tile-icon { font-size:28px; margin-bottom:8px; }
.quick-tile .tile-label { font-size:13px; font-weight:600; color:var(--cascade-navy); }
.quick-tile .tile-sub { font-size:11px; color:var(--text-secondary); margin-top:2px; }
/* Badges */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:12px; font-size:11.5px; font-weight:600; }
.badge-green { background:var(--green-light); color:var(--green); }
.badge-amber { background:var(--amber-light); color:var(--amber); }
.badge-red { background:var(--red-light); color:var(--red); }
.badge-blue { background:var(--cascade-blue-light); color:var(--cascade-blue); }
.badge-gray { background:var(--gray-light); color:var(--text-secondary); }
/* Tables */
.data-table { width:100%; border-collapse:collapse; }
.data-table th { font-size:11px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.5px; text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); }
.data-table td { padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; }
.data-table tr:hover td { background:var(--cascade-blue-light); }
/* Callouts */
.callout { padding:14px 18px; border-radius:8px; border-left:3px solid; font-size:13px; margin-bottom:16px; }
.callout-blue { background:var(--cascade-blue-light); border-color:var(--cascade-blue); color:var(--cascade-navy); }
.callout-green { background:var(--green-light); border-color:var(--green); }
.callout-amber { background:var(--amber-light); border-color:var(--amber); }
.callout-red { background:var(--red-light); border-color:var(--red); }
/* Intelligence card */
.intel-card { background:linear-gradient(135deg,#0D1E3A 0%,#0057B8 100%); color:#fff; border-radius:10px; padding:22px; margin-bottom:16px; }
.intel-card .intel-label { font-size:12px; font-weight:600; opacity:.8; margin-bottom:8px; }
.intel-card .intel-text { font-size:14px; line-height:1.6; }
.intel-card .intel-cta { margin-top:14px; }
.intel-card .intel-cta button { background:rgba(255,255,255,.2); color:#fff; border:1px solid rgba(255,255,255,.3); padding:10px 20px; border-radius:7px; font-weight:600; font-size:13px; }
.intel-card .intel-cta button:hover { background:rgba(255,255,255,.3); }
/* Alert rows */
.alert-row { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.alert-row:last-child { border-bottom:none; }
.severity-dot { width:8px; height:8px; border-radius:50%; margin-top:6px; flex-shrink:0; }
.severity-dot.red { background:var(--red); }
.severity-dot.amber { background:var(--amber); }
.severity-dot.blue { background:var(--cascade-blue); }
.alert-content { flex:1; }
.alert-title { font-weight:600; font-size:13px; }
.alert-desc { font-size:12px; color:var(--text-secondary); margin-top:2px; }
.alert-rec { font-size:12px; color:var(--cascade-blue); margin-top:4px; }
.alert-action { flex-shrink:0; margin-left:auto; }
/* Tabs */
.tab-bar { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:18px; }
.tab-item { padding:10px 20px; font-size:13px; font-weight:600; color:var(--text-secondary); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .12s; }
.tab-item:hover { color:var(--cascade-blue); }
.tab-item.active { color:var(--cascade-blue); border-bottom-color:var(--cascade-blue); }
/* Wizard */
.wizard-steps { display:flex; align-items:center; justify-content:center; gap:0; margin-bottom:28px; padding:20px 0; }
.wiz-step { display:flex; align-items:center; gap:0; }
.wiz-circle { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; }
.wiz-circle.done { background:var(--green); color:#fff; }
.wiz-circle.active { background:var(--cascade-blue); color:#fff; }
.wiz-circle.pending { background:var(--gray-light); color:var(--text-secondary); border:2px solid var(--border); }
.wiz-line { width:60px; height:2px; }
.wiz-line.done { background:var(--green); }
.wiz-line.pending { background:var(--border); }
.wiz-label { font-size:11px; text-align:center; margin-top:6px; }
.wizard-nav { display:flex; justify-content:space-between; margin-top:24px; padding-top:18px; border-top:1px solid var(--border); }
/* Splash */
.splash-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:200; }
.splash-card { background:#fff; border-radius:10px; padding:40px; text-align:center; max-width:420px; width:90%; }
.splash-icon { font-size:56px; margin-bottom:14px; }
.splash-title { font-size:20px; font-weight:700; color:var(--cascade-navy); margin-bottom:8px; }
.splash-text { font-size:14px; color:var(--text-secondary); margin-bottom:24px; line-height:1.6; }
.splash-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
/* QR Modal */
.qr-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:200; }
.qr-modal { background:#fff; border-radius:10px; max-width:420px; width:90%; overflow:hidden; }
.qr-modal-header { padding:18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
.qr-modal-header h3 { font-size:16px; font-weight:600; }
.qr-camera { width:100%; aspect-ratio:1; background:#111; position:relative; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.qr-corners { position:absolute; inset:20%; border:3px solid var(--cascade-blue); border-radius:8px; }
.qr-scanline { position:absolute; left:20%; right:20%; height:2px; background:var(--cascade-blue); opacity:.6; animation:scanline 2s ease-in-out infinite; }
@keyframes scanline { 0%{top:20%} 50%{top:78%} 100%{top:20%} }
.qr-status { color:#fff; font-size:14px; position:absolute; bottom:14%; text-align:center; width:100%; }
.qr-result { padding:18px; }
.qr-result-card { border:2px solid var(--green); border-radius:8px; padding:14px; }
.qr-result-card.error { border-color:var(--red); }
.qr-result-card h4 { font-size:14px; font-weight:600; margin-bottom:6px; }
/* Stock bar */
.stock-bar-wrap { width:100px; height:6px; background:var(--gray-light); border-radius:3px; }
.stock-bar { height:100%; border-radius:3px; }
.stock-bar.green { background:var(--green); }
.stock-bar.amber { background:var(--amber); }
.stock-bar.red { background:var(--red); }
/* Chart bars */
.chart-bar-wrap { margin-bottom:10px; }
.chart-bar-label { font-size:12px; color:var(--text-secondary); margin-bottom:4px; display:flex; justify-content:space-between; }
.chart-bar-track { height:20px; background:var(--gray-light); border-radius:4px; overflow:hidden; }
.chart-bar-fill { height:100%; background:var(--cascade-blue); border-radius:4px; transition:width .3s; }
/* Mobile kanban */
.mobile-wrap { max-width:480px; margin:0 auto; padding:20px; }
.mobile-wrap .mobile-header { text-align:center; margin-bottom:24px; }
.mobile-wrap .mobile-header .role-label { display:inline-block; background:var(--cascade-blue-light); color:var(--cascade-blue); padding:4px 12px; border-radius:12px; font-size:12px; font-weight:600; margin-bottom:8px; }
.mobile-scan-btn { width:100%; padding:18px; background:var(--cascade-blue); color:#fff; border-radius:10px; font-size:16px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:10px; min-height:56px; }
.mobile-scan-btn:hover { background:var(--cascade-blue-dark); }
.urgency-toggles { display:flex; flex-direction:column; gap:10px; margin:16px 0; }
.urgency-btn { width:100%; padding:16px; border:2px solid var(--border); border-radius:10px; text-align:center; font-size:14px; font-weight:600; background:#fff; min-height:48px; transition:all .12s; }
.urgency-btn.selected-green { border-color:var(--green); background:var(--green-light); color:var(--green); }
.urgency-btn.selected-amber { border-color:var(--amber); background:var(--amber-light); color:var(--amber); }
.urgency-btn.selected-red { border-color:var(--red); background:var(--red-light); color:var(--red); }
.mobile-submit { width:100%; padding:18px; background:var(--green); color:#fff; border-radius:10px; font-size:16px; font-weight:600; min-height:56px; margin-top:16px; }
.mobile-confirm { text-align:center; padding:40px 20px; }
.mobile-confirm .confirm-icon { font-size:48px; margin-bottom:12px; }
.mobile-confirm .confirm-title { font-size:24px; font-weight:700; color:var(--cascade-navy); margin-bottom:16px; }
.mobile-confirm .confirm-detail { font-size:14px; color:var(--text-secondary); line-height:1.8; margin-bottom:24px; }
.request-card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:10px; }
/* Warehouse grid */
.wh-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; margin:16px 0; }
.wh-cell { padding:10px 6px; text-align:center; border:1px solid var(--border); border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; transition:all .12s; }
.wh-cell.available { background:#fff; }
.wh-cell.available:hover { border-color:var(--cascade-blue); background:var(--cascade-blue-light); }
.wh-cell.near-full { background:var(--amber-light); border-color:var(--amber); }
.wh-cell.full { background:var(--gray-light); color:var(--text-secondary); cursor:not-allowed; }
.wh-cell.selected { background:var(--cascade-blue-light); border-color:var(--cascade-blue); }
/* Access restricted */
.access-restricted { display:flex; align-items:center; justify-content:center; min-height:60vh; }
.access-card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:48px; text-align:center; max-width:400px; }
.access-card .access-icon { font-size:40px; margin-bottom:14px; }
.access-card h2 { font-size:18px; font-weight:700; color:var(--cascade-navy); margin-bottom:8px; }
.access-card p { font-size:14px; color:var(--text-secondary); margin-bottom:24px; }
/* Checkbox */
.checkbox { width:18px; height:18px; cursor:pointer; accent-color:var(--cascade-blue); }
/* Item detail panel */
.item-detail { padding:20px; }
.item-detail h2 { font-size:20px; font-weight:700; margin-bottom:4px; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:18px 0; }
.detail-section { background:var(--surface); border-radius:8px; padding:16px; }
.detail-section h4 { font-size:12px; font-weight:600; text-transform:uppercase; color:var(--text-secondary); margin-bottom:10px; }
.detail-row { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
.movement-row { display:flex; gap:10px; font-size:12px; padding:8px 0; border-bottom:1px solid var(--border); }
.movement-row:last-child { border:none; }
.read-only-banner { background:var(--cascade-blue-light); color:var(--cascade-blue); padding:12px 18px; border-radius:8px; font-size:13px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
/* BOL preview */
.bol-preview { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:20px; font-family:'Courier New',monospace; font-size:13px; line-height:1.8; white-space:pre-wrap; }
/* PO Wizard modal */
.po-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:200; overflow-y:auto; padding:20px; }
.po-modal { background:#fff; border-radius:10px; max-width:700px; width:100%; max-height:90vh; overflow-y:auto; }
.po-modal-header { padding:18px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.po-modal-body { padding:24px; }
/* Misc */
.link { color:var(--cascade-blue); cursor:pointer; font-weight:600; font-size:13px; }
.link:hover { text-decoration:underline; }
.mt-2 { margin-top:8px; }
.mt-4 { margin-top:16px; }
.mb-2 { margin-bottom:8px; }
.mb-4 { margin-bottom:16px; }
.text-sm { font-size:12px; }
.text-sec { color:var(--text-secondary); }
.flex { display:flex; }
.flex-between { display:flex; align-items:center; justify-content:space-between; }
.gap-2 { gap:8px; }
.gap-3 { gap:12px; }

// ==================== COMPONENTS ====================

function Badge({status}) {
  const map = {Healthy:'green',Complete:'green',Active:'green',Low:'amber',Pending:'amber',Warning:'amber',Critical:'red',Overdue:'red',Urgent:'red',Info:'blue','In Transit':'blue',Sent:'blue',Draft:'gray'};
  const icons = {Healthy:'✅',Critical:'🔴',Low:'⚠️',Overdue:'🔴',Urgent:'🔴','In Transit':'🔵',Sent:'🔵',Complete:'✅',Active:'✅',Pending:'⚠️',Info:'🔵',Warning:'⚠️',Draft:'⚪'};
  const c = map[status]||'gray';
  return <span className={`badge badge-${c}`}>{icons[status]||''} {status}</span>;
}

function WizardSteps({steps,current}) {
  return <div className="wizard-steps">{steps.map((s,i)=><React.Fragment key={i}>
    {i>0 && <div className={`wiz-line ${i<=current?'done':'pending'}`}/>}
    <div style={{textAlign:'center'}}>
      <div className={`wiz-circle ${i<current?'done':i===current?'active':'pending'}`}>
        {i<current?'✓':(i+1)}
      </div>
      <div className="wiz-label" style={{color:i<=current?'var(--cascade-navy)':'var(--text-secondary)',maxWidth:80,fontSize:11}}>{s}</div>
    </div>
  </React.Fragment>)}</div>;
}

function QRModal({onClose,onResult,context,actionLabel,actionColor,itemInfo}) {
  const [phase,setPhase] = useState('ready');
  const [manualEntry,setManualEntry] = useState(false);
  const doScan = ()=>{ setPhase('scanning'); setTimeout(()=>setPhase('done'),1800); };
  const info = itemInfo || {name:'DAFO EVA Foam 3mm Natural',sku:'DAFO-FM-3-NTL',location:'A2-03',onHand:212};
  const actLabel = actionLabel || 'Confirm & Apply';
  const actColor = actionColor || 'var(--cascade-blue)';

  // G-02: Split-panel on scan success
  if(phase==='done') return <div className="qr-modal-overlay" onClick={onClose}>
    <div className="qr-split-modal" onClick={e=>e.stopPropagation()}>
      <div className="qr-modal-header"><h3>📷 QR Scanned</h3><button onClick={onClose} style={{fontSize:20,background:'none',cursor:'pointer'}}>✕</button></div>
      <div className="qr-split-body">
        <div className="qr-split-left">
          <div className="qr-info-card">
            <h4>{info.name}</h4>
            <div className="qr-info-row"><span>SKU</span><strong>{info.sku}</strong></div>
            <div className="qr-info-row"><span>Location</span><strong>{info.location}</strong></div>
            <div className="qr-info-row"><span>On Hand</span><strong>{info.onHand}</strong></div>
          </div>
          <p style={{fontSize:12,color:'var(--text-secondary)',marginTop:10}}>{context||''}</p>
        </div>
        <div className="qr-split-right">
          <button className="qr-action-btn" style={{background:actColor}} onClick={()=>{onResult&&onResult();onClose();}}>
            <span style={{fontSize:28}}>✅</span>
            <span>{actLabel}</span>
          </button>
        </div>
      </div>
    </div>
  </div>;

  // Pre-scan: full-width camera
  return <div className="qr-modal-overlay" onClick={onClose}>
    <div className="qr-modal" onClick={e=>e.stopPropagation()}>
      <div className="qr-modal-header"><h3>📷 Scan QR Code</h3><button onClick={onClose} style={{fontSize:20,background:'none',cursor:'pointer'}}>✕</button></div>
      <p style={{padding:'10px 18px',fontSize:13,color:'var(--text-secondary)'}}>Point at any QR label — item, shelf, packing slip, or Kanban card</p>
      {!manualEntry && <div className="qr-camera" onClick={doScan}>
        <div className="qr-corners"/>
        {phase==='scanning' && <div className="qr-scanline"/>}
        <div className="qr-status">{phase==='ready'?'Tap to simulate scan':'Scanning...'}</div>
      </div>}
      {!manualEntry && <div style={{padding:'12px 18px',textAlign:'center'}}>
        <button className="link" onClick={()=>setManualEntry(true)}>QR not working? Enter manually →</button>
      </div>}
      {manualEntry && <div style={{padding:'18px'}}>
        <div className="form-field"><label>Enter PO / SKU / Location Code</label>
          <input placeholder="e.g. PO-2026-0411 or DAFO-FM-3-NTL" style={{width:'100%',padding:'10px 14px',border:'1px solid var(--border)',borderRadius:7}}/>
        </div>
        <div className="flex gap-2">
          <button className="btn-sm btn-blue" onClick={()=>setPhase('done')}>Look Up</button>
          <button className="btn-sm btn-outline" onClick={()=>setManualEntry(false)}>Back to Camera</button>
        </div>
      </div>}
    </div>
  </div>;
}

// G-03: Toast notification component
function Toast({message,type,onDone}) {
  useEffect(()=>{const t=setTimeout(()=>onDone&&onDone(),4000);return ()=>clearTimeout(t);},[]);
  return <div className={`toast toast-${type||'green'}`} role="alert" aria-live="assertive">{message}</div>;
}

// G-01: Exit confirmation dialog
function ExitConfirmDialog({onCancel,onExit}) {
  useEffect(()=>{
    const handler=(e)=>{if(e.key==='Escape')onCancel();};
    document.addEventListener('keydown',handler);
    return ()=>document.removeEventListener('keydown',handler);
  },[]);
  return <div className="confirm-overlay" onClick={onCancel}>
    <div className="confirm-dialog" role="alertdialog" aria-label="Exit without saving" onClick={e=>e.stopPropagation()}>
      <h3>Exit without saving?</h3>
      <p>Your progress will be lost.</p>
      <div className="confirm-actions">
        <button className="btn-sm btn-outline" onClick={onCancel}>Cancel</button>
        <button className="btn-sm btn-red" onClick={onExit}>Exit</button>
      </div>
    </div>
  </div>;
}

function StockBar({onHand,min}) {
  const pct = Math.min(100,Math.round((onHand/Math.max(min,1))*100));
  const c = pct>=100?'green':pct>=50?'amber':'red';
  return <div className="stock-bar-wrap"><div className={`stock-bar ${c}`} style={{width:`${pct}%`}}/></div>;
}

function ChartBar({label,value,max,amount}) {
  const pct = Math.round((value/max)*100);
  return <div className="chart-bar-wrap">
    <div className="chart-bar-label"><span>{label}</span><span>${amount?.toLocaleString()}</span></div>
    <div className="chart-bar-track"><div className="chart-bar-fill" style={{width:`${pct}%`}}/></div>
  </div>;
}

              <div className="facility-bar-wrap">
                <div className="facility-bar-fill" style={{width:`${pct}%`,background:barColor}}><span>{f.onHand}</span></div>

        {transferOpps.map((t,i)=><div className="transfer-opp-row" key={i}>

      <div className="text-sm text-sec mt-4" style={{textAlign:'center'}}>3 locations: Blaine Warehouse | Blaine Floor | Ferndale Production</div>
    </div>}

  return <div>

function CycleCountScreen({nav,addToast}) {
  const [zoneTab,setZoneTab]=useState('a');
  const [counting,setCounting]=useState(false);
  const [counts,setCounts]=useState({});
  const countItems = ITEMS.slice(0,5);

  const zones = [
    {id:'a',label:'A-Zone — High Value',badge:'Due today',badgeColor:'red',desc:'High-value raw materials: EVA foam, PP sheets, overlays. Counted weekly due to production impact.',schedule:'Weekly (every Monday)',lastVariance:'2 found (both <5%) — Mar 28, 2026'},
    {id:'b',label:'B-Zone — Medium Value',badge:'Apr 15',badgeColor:'amber',desc:'Assembly components: velcro, rivets, strapping. Monthly count — moderate production impact.',schedule:'Monthly (15th)',lastVariance:'0 variances — Mar 15, 2026'},
    {id:'c',label:'C-Zone — Consumables',badge:'Jun 1',badgeColor:'green',desc:'Consumables and finishing materials: adhesives, buffer strips. Quarterly count — low impact.',schedule:'Quarterly (1st of quarter)',lastVariance:'1 found (<3%) — Jan 1, 2026'},
  ];
  const activeZone = zones.find(z=>z.id===zoneTab);

  return <div>
    {/* CC-02: Zone context description callout */}
    <div className="callout callout-blue mb-4">Cycle Count — Physical verification of on-hand stock against system quantities. A-Zone weekly (high value). B-Zone monthly. C-Zone quarterly.</div>

    {/* CC-01: 3 zone tabs */}
    <div className="tab-bar">
      {zones.map(z=><div key={z.id} className={`tab-item${zoneTab===z.id?' active':''}`} onClick={()=>{setZoneTab(z.id);setCounting(false);setCounts({});}}>
        {z.label} <span className={`badge badge-${z.badgeColor}`} style={{marginLeft:6}}>{z.badge}</span>
      </div>)}
    </div>

    {/* CC-01: Zone content — description, schedule, last variance, start button */}
    <div className="card">
      <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:12,lineHeight:1.5}}>{activeZone.desc}</div>
      <div className="detail-row"><span className="text-sec">Schedule</span><strong>{activeZone.schedule}</strong></div>
      <div className="detail-row"><span className="text-sec">Last Variance</span><strong>{activeZone.lastVariance}</strong></div>

      {!counting && <div className="mt-4">
        <button className="btn-sm btn-blue" style={{padding:'12px 24px'}} onClick={()=>setCounting(true)}>▶ Start {activeZone.label.split(' —')[0]} Count</button>
      </div>}

      {counting && <>
        <div className="card-header mt-4">Count Sheet — {activeZone.label.split(' —')[0]}, Blaine</div>
        <table className="data-table"><thead><tr><th>Item</th><th>SKU</th><th>Location</th><th>System Qty</th><th>Counted Qty</th><th>Variance</th></tr></thead>
        <tbody>{countItems.map((it,i)=>{
          const counted = counts[i];
          const variance = counted!==undefined?(counted-it.onHand):null;
          const pct = variance!==null?Math.abs(Math.round((variance/it.onHand)*100)):null;
          return <tr key={i}><td>{it.name}</td><td><span className="badge badge-gray">{it.sku}</span></td><td>{it.loc}</td><td>{it.onHand}</td>
            <td><input type="number" value={counted!==undefined?counted:''} onChange={e=>setCounts({...counts,[i]:e.target.value===''?undefined:parseInt(e.target.value)})} placeholder="Enter"/></td>
            <td>{variance!==null?(pct===0?<span className="badge badge-green">✅ Match</span>:pct<=5?<span className="badge badge-amber">⚠️ Minor ({variance>0?'+':''}{variance})</span>:pct<=15?<span className="badge badge-red">🔴 Investigate ({variance>0?'+':''}{variance})</span>:<span className="badge badge-red">🚨 Critical ({variance>0?'+':''}{variance})</span>):'—'}</td>
          </tr>})}</tbody></table>
        <div className="mt-4"><button className="btn-sm btn-green" style={{padding:'12px 24px'}} onClick={()=>{addToast&&addToast(`✅ ${activeZone.label.split(' —')[0]} cycle count submitted — ${countItems.length} items counted, variances recorded.`,'green');setCounting(false);setCounts({});}}>Submit Count Report</button></div>
      </>}
    </div>
  </div>;
}

      <div className="kpi-card"><div className="kpi-label">Avg Lead Time</div><div className="kpi-value">4.2 days</div><div className="kpi-trend green">↓ Improved</div></div>
    </div>

    {/* PD-01: Inventory Level Trends (replaces Recent PO Activity) */}
    <div className="grid-2">
      <div className="card">
        <div className="card-header"><span>Inventory Level Trends</span></div>
        {trendItems.map((it,i)=>{
          const pct=Math.min(100,Math.round((it.onHand/Math.max(it.min*3,1))*100));
          const thresholdPct=Math.round((it.min/(it.min*3))*100);
          const barColor=it.onHand>=it.min?'var(--green)':it.onHand>=it.min*0.5?'var(--amber)':'var(--red)';

          return <div className="inv-trend-row" key={i}>
            <div className="inv-trend-name">{it.name}</div>
            <div className="inv-trend-bar-wrap">
              <div className="inv-trend-fill" style={{width:`${pct}%`,background:barColor}}><span>{it.onHand} / min {it.min}</span></div>
              <div className="inv-trend-threshold" style={{left:`${thresholdPct}%`}}/>
            </div>
            {!isReadOnly && it.onHand<it.min && <div className="inv-trend-action">
              <button className={`btn-sm ${isCritical?'btn-red':'btn-amber'}`} style={{fontSize:12}} onClick={()=>setReplenishItem(it)}>Replenish</button>
            </div>}
          </div>;
        })}

            <polyline className="chart-line" points={spendData.map((d,i)=>`${50+i*88},${160-((d.s/maxSpend)*140)}`).join(' ')}/>

              <circle className="chart-dot" cx={50+i*88} cy={160-((d.s/maxSpend)*140)} r={chartHover===i?6:4} style={{cursor:'pointer'}}/>

              <text className="chart-label" x={50+i*88} y="178" textAnchor="middle">{d.m}</text>

      <div className="quick-tile" onClick={()=>nav&&nav('purchasing-mgmt')}><div className="tile-icon">🤝</div><div className="tile-label">Manage Contracts</div></div>
    </div>}

    {isReadOnly && <div className="card mt-4">
      <div className="card-header">Vendor Performance</div>
      <table className="data-table"><thead><tr><th>Vendor</th><th>Score</th><th>On-Time</th><th>Lead Time</th><th>Last Issue</th></tr></thead>
      <tbody>{VENDORS.map((v,i)=><tr key={i}><td style={{fontWeight:600}}>{v.name}</td>
        <td><span className={`badge badge-${v.score>=8?'green':v.score>=7?'amber':'red'}`}>{v.score}/10</span></td>
        <td>{v.onTime}%</td><td>{v.lead} days</td><td>{v.lastIssue}</td>
      </tr>)}</tbody></table>
    </div>}

    {/* PD-02: Replenishment slide-in pane */}
    {replenishItem && <>
      <div className="replenish-pane-overlay" onClick={()=>setReplenishItem(null)}/>
      <div className="replenish-pane">

            <div className="detail-row"><span className="text-sec">Suggested Order Qty</span><strong>{replenishItem.suggestQty}</strong></div>

          {(()=>{const v=VENDORS.find(x=>x.name===replenishItem.supplier);return v?<div className="vendor-suggest">

            <div className="detail-row"><span className="text-sec">Lead Time</span><strong>{v.lead} days</strong></div>
            <div className="detail-row"><span className="text-sec">On-Time</span><strong>{v.onTime}%</strong></div>

    {/* PD-02: Session accumulator bottom bar (Component 16) */}

    {sev:'red',cat:'POs',title:'PO-0412 Texas Steel — OVERDUE',desc:'3 days overdue, 12 items',btn:'View PO'},
    {sev:'amber',cat:'Stock',title:'Velcro Strap Black 1"',desc:'210 units, reorder 300, 2 days left',btn:'Add to PO'},
    {sev:'amber',cat:'Stock',title:'Rivet 1/4" Steel',desc:'340 units, reorder 500, 3 days',btn:'Add to PO'},
    {sev:'blue',cat:'Transfers',title:'Pacific Foam truck today',desc:'ETA 2:30 PM, PO-0411, 8 items',btn:'Receive'},
    {sev:'amber',cat:'Stock',title:'EVA Foam 5mm Blue',desc:'45 units, reorder 80, 4 days',btn:'Add to PO'},
    {sev:'blue',cat:'Transfers',title:'BOL-2026-041 dispatched',desc:'Ferndale — 40u, ETA 10:15 AM',btn:'View Transfer'},
  ];
  const tabs = [
    {id:'all',icon:'✅',label:`All (${alerts.length})`},
    {id:'Critical',icon:'🔴',label:`Critical (${alerts.filter(a=>a.sev==='red').length})`},
    {id:'Stock',icon:'📦',label:`Stock (${alerts.filter(a=>a.cat==='Stock').length})`},
    {id:'POs',icon:'📄',label:`POs (${alerts.filter(a=>a.cat==='POs').length})`},
    {id:'Transfers',icon:'🚚',label:`Transfers (${alerts.filter(a=>a.cat==='Transfers').length})`},
  ];
  const filtered = tab==='all'?alerts:tab==='Critical'?alerts.filter(a=>a.sev==='red'):alerts.filter(a=>a.cat===tab);

  // NAV-01: Route per role
  const handleAction = (btn)=>{
    if(btn==='Receive'){nav('grn');}
    else if(btn==='View Transfer'){nav('transfers');}
    else if(role==='warehouse-manager'){nav('purchasing-view');}
    else{nav('purchasing-mgmt');}
  };

  useEffect(()=>{const h=(e)=>{if(e.key==='Escape')onClose();};document.addEventListener('keydown',h);return()=>document.removeEventListener('keydown',h);},[]);

  return <>
    <div className="alerts-pane-overlay" onClick={onClose}/>
    <div className="alerts-pane">
      <div className="alerts-pane-header"><h3>Alerts & Intelligence</h3><button onClick={onClose} style={{background:'none',color:'#fff',fontSize:20,cursor:'pointer',width:40,height:40,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div>
      <div className="tab-bar" style={{padding:'0 12px'}}>
        {tabs.map(t=><div key={t.id} className={`tab-item${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)} style={{padding:'8px 8px',fontSize:11}}>{t.icon} {t.label}</div>)}
      </div>
      <div className="alerts-pane-body">
        {filtered.map((a,i)=><div className="alert-pane-item" key={i}>
          <div className="flex items-center gap-2" style={{marginBottom:4}}>
            <div className={`severity-dot ${a.sev}`}/>
            <div style={{fontWeight:600,fontSize:13}}>{a.title}</div>
          </div>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:8,marginLeft:20}}>{a.desc}</div>
          <div style={{marginLeft:20}}><button className="btn-sm btn-blue" style={{fontSize:11,padding:'4px 10px'}} onClick={()=>handleAction(a.btn)}>{a.btn}</button></div>
        </div>)}
      </div>
    </div>
  </>;
}

// ==================== APP SHELL ====================
function AppShell({role,onLogout}) {
  const [screen,setScreen]=useState(DEFAULT_SCREENS[role]);
  const [showGlobalQR,setShowGlobalQR]=useState(false);
  const [toasts,setToasts]=useState([]);
  const [wizardActive,setWizardActive]=useState(false);
  const [pendingNav,setPendingNav]=useState(null);
  const [navContext,setNavContext]=useState(null);
  const [alertsPaneOpen,setAlertsPaneOpen]=useState(false);
  const addToast = useCallback((message,type)=>{
    const id=Date.now();
    setToasts(prev=>[...prev,{id,message,type}]);
  },[]);
  const removeToast = useCallback((id)=>{setToasts(prev=>prev.filter(t=>t.id!==id));},[]);
  const roleData = ROLES.find(r=>r.id===role);
  const navGroups = NAV_CONFIG[role]||[];
  const allNavIds = navGroups.flatMap(g=>g.items.map(i=>i.id));
  const showFacilityBar = ['warehouse-manager','director-manufacturing'].includes(role);

  // Screen title mapping
  const titles = {dashboard:'Operations Dashboard',alerts:'Alerts & Intelligence',grn:'Receive Goods — GRN',inventory:'Inventory / QR Scan','cycle-count':'Cycle Count',transfers:'Transfers — Blaine to Ferndale','purchasing-view':'Purchasing Dashboard','purchasing-dash':'Purchasing Dashboard','purchasing-mgmt':'Purchasing','active-pos':'Active POs','vendor-perf':'Vendor Performance','dashboard-mfg':'Production Dashboard — Ferndale',kanban:'Request Materials from Blaine','transfers-mfg':'Transfer Status','exec-dash':'Executive Overview','po-approvals':'PO Approval Queue'};

  const nav = (id,ctx)=>{
    if(wizardActive && id!==screen){setPendingNav(id);return;}
    setScreen(id);setWizardActive(false);if(ctx)setNavContext(ctx);else setNavContext(null);
  };

  // For production-floor, render mobile-only (no sidebar)
  if(role==='production-floor') return <div style={{background:'var(--surface)',minHeight:'100vh'}}>
    <div style={{background:'#fff',padding:'12px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div><strong style={{fontSize:15}}>cascade <span style={{color:'var(--cascade-blue)'}}>DAFO</span></strong><div style={{fontSize:10,color:'#7F9FCC',textTransform:'uppercase',letterSpacing:1}}>WMS INTELLIGENCE</div></div>
      <button className="btn-sm btn-outline" onClick={onLogout}>Sign Out</button>
    </div>
    <KanbanScreen role={role}/>
  </div>;

  const renderScreen = ()=>{
    // Check permissions
    if(!allNavIds.includes(screen)){
      // Special case: warehouse-manager viewing purchasing
      if(role==='warehouse-manager'&&screen==='purchasing-view') return <PurchasingDashScreen role={role} nav={nav} addToast={addToast}/>;
      return <AccessRestricted nav={nav} role={role}/>;
    }
    switch(screen){
      case 'dashboard': return <DashboardWM nav={nav} openAlerts={()=>setAlertsPaneOpen(true)}/>;
      case 'alerts': return <AlertsScreen nav={nav}/>;
      case 'grn': return <GRNScreen nav={nav} addToast={addToast} setWizardActive={setWizardActive}/>;
      case 'inventory': return <InventoryScreen nav={nav}/>;
      case 'cycle-count': return <CycleCountScreen nav={nav} addToast={addToast}/>;
      case 'transfers': return <TransfersScreen nav={nav} addToast={addToast} setWizardActive={setWizardActive} preSelectedItem={navContext}/>;
      case 'purchasing-view': return <PurchasingDashScreen role={role} nav={nav} addToast={addToast}/>;
      case 'purchasing-dash': return <PurchasingDashScreen role={role} nav={nav} addToast={addToast}/>;
      case 'purchasing-mgmt': return <PurchasingMgmtScreen initialTab="worksheet" nav={nav} addToast={addToast}/>;
      case 'active-pos': return <PurchasingMgmtScreen initialTab="active-pos" nav={nav} addToast={addToast}/>;
      case 'vendor-perf': return <PurchasingMgmtScreen initialTab="vendor-perf" nav={nav} addToast={addToast}/>;
      case 'dashboard-mfg': return <DashboardMfg nav={nav} addToast={addToast}/>;
      case 'kanban': return <KanbanScreen role={role}/>;
      case 'transfers-mfg': return <TransfersScreen readOnly={true} nav={nav} addToast={addToast}/>;
      case 'exec-dash': return <ExecDashboard mode="overview"/>;
      case 'po-approvals': return <ExecDashboard mode="approvals"/>;
      default: return <AccessRestricted nav={nav} role={role}/>;
    }
  };

  return <div className="app-shell">
    <div className="sidebar">
      <div className="sidebar-logo">
        <div className="logo-mark"><div className="logo-icon">C</div><div className="logo-text">cascade <span>DAFO</span></div></div>
        <div className="logo-sub">WMS INTELLIGENCE</div>
      </div>
      <div className="sidebar-nav">
        {navGroups.map((g,gi)=><div key={gi} className="nav-section">
          {g.section && <div className="nav-section-label">{g.section}</div>}
          {g.items.map(item=><div key={item.id} className={`nav-item${screen===item.id?' active':''}`} onClick={()=>{
            // NAV-02: Alerts nav item triggers pane, not screen navigation
            if(item.id==='alerts'){setAlertsPaneOpen(true);return;}
            nav(item.id);
          }}>
            <span className="nav-icon">{item.icon}</span>{item.label}
            {item.badge && <span className={`nav-badge${item.badgeColor?' '+item.badgeColor:''}`}>{item.badge}</span>}
          </div>)}
        </div>)}
      </div>
      <div className="sidebar-user" style={{cursor:'pointer'}} onClick={onLogout}>
        <div className="avatar">{roleData?.initials}</div>
        <div><div className="uname">{roleData?.name}</div><div className="urole">{roleData?.title}</div></div>
      </div>
    </div>
    <div className="main-area">
      <div className="topbar">
        <div className="topbar-title">{titles[screen]||'Dashboard'}</div>
        <div className="topbar-actions">
          <input className="topbar-search" placeholder="🔍 Search..."/>
          <button className="topbar-btn" onClick={()=>setShowGlobalQR(true)}>📷 Scan QR</button>
          <button className="bell-btn" onClick={()=>setAlertsPaneOpen(true)} aria-label="Open alerts (3 new)"><span style={{fontSize:20}}>🔔</span><span className="bell-badge">3</span></button>
          <div style={{width:32,height:32,borderRadius:'50%',background:'var(--cascade-blue)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:600,fontSize:13}}>{roleData?.initials}</div>
        </div>
      </div>
      {showFacilityBar && <div className="facility-bar">
        <div className="facility-pill"><div className="facility-dot amber"/> <strong>BLAINE</strong> 62% capacity · 3 trucks today</div>
        <div className="facility-pill"><div className="facility-dot red"/> <strong>FERNDALE</strong> 78% capacity · 14 active orders</div>
      </div>}
      {role==='general-manager'&&screen!=='exec-dash'&&screen!=='po-approvals'&&<div className="read-only-banner" style={{margin:'20px 24px 0'}}>Viewing in read-only mode — executive overview only.</div>}
      {pendingNav && <ExitConfirmDialog onCancel={()=>setPendingNav(null)} onExit={()=>{setWizardActive(false);setScreen(pendingNav);setPendingNav(null);}}/>}
      {/* A-01: Alerts side pane (440px slide-in) */}
      {alertsPaneOpen && <AlertsPane role={role} nav={(id)=>{setAlertsPaneOpen(false);nav(id);}} onClose={()=>setAlertsPaneOpen(false)}/>}
      {showGlobalQR && <QRModal onClose={()=>setShowGlobalQR(false)} onResult={()=>{setShowGlobalQR(false);nav('inventory');}}/>}
      <div className="page-content">{renderScreen()}</div>
      {toasts.length>0 && <div className="toast-container" aria-live="polite">{toasts.map(t=><Toast key={t.id} message={t.message} type={t.type} onDone={()=>removeToast(t.id)}/>)}</div>}
    </div>
  </div>;
}

// ==================== ROOT ====================
function App() {
  const [role,setRole] = useState(null);
  if(!role) return <LoginScreen onLogin={setRole}/>;
  return <AppShell role={role} onLogout={()=>setRole(null)}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
